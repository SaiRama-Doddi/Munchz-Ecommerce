# ===============================
# APPLICATION
# ===============================
spring.application.name=order-service
server.port=9090

# ===============================
# DATABASE (NEON POSTGRES)
# ===============================
#spring.datasource.url=jdbc:postgresql://ep-shy-art-a1xzcdm4-pooler.ap-southeast-1.aws.neon.tech/Munchz-Order-Service?sslmode=require&channelBinding=require
#spring.datasource.username=neondb_owner
#spring.datasource.password=${DB_PASSWORD}


spring.datasource.url=jdbc:postgresql://postgres:5432/orderdb
spring.datasource.username=munchzuser
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# IMPORTANT ? let Hibernate auto-detect dialect
# DO NOT manually set dialect
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# FLYWAY
# ===============================
spring.flyway.enabled=false

# ===============================
# EUREKA CLIENT
# ===============================
# ===============================
# EUREKA CLIENT
# ===============================
#eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.client.enabled=false
spring.cloud.discovery.enabled=false


# ===============================
# JWT CONFIG
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000

# ===============================
# MICROSERVICE URLS (IMPORTANT)
# ===============================
#services.user-profile.url=http://localhost:8082
#services.product-service.url=http://localhost:8083
#services.inventory.service.url=http://localhost:8050

services.user-profile.url=http://user-profile-service:8082
services.product-service.url=http://product-service:8083
services.inventory.service.url=http://stock-service:8050

# ===============================
# LOGGING (DEBUG FRIENDLY)
# ===============================
logging.level.org.springframework.cloud.loadbalancer=DEBUG
logging.level.feign=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.orm.jpa=DEBUG
logging.level.org.springframework.transaction=TRACE
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=ERROR

# ===============================
# ERROR DETAILS
# ===============================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-exception=true
